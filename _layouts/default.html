<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 | default: site.description }}">
  {% if site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090a10;
      --surface: #11131f;
      --border: rgba(255,255,255,0.06);
      --text: #e8eaed;
      --text-secondary: #9aa0a6;
      --accent: #7c6ff0;
      --gradient-1: linear-gradient(135deg, #7c6ff0, #5b8def);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(9, 10, 16, 0.82);
      backdrop-filter: blur(18px) saturate(1.4);
      padding: 0 2rem;
      height: 60px;
      display: flex; align-items: center; justify-content: center; gap: 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500; font-size: 0.875rem;
      letter-spacing: 0.01em;
      transition: color 0.25s;
      position: relative;
    }
    nav a::after {
      content: '';
      position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; border-radius: 2px;
      background: var(--gradient-1);
      opacity: 0; transform: scaleX(0);
      transition: opacity 0.3s, transform 0.3s;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; }
    nav a.active::after, nav a:hover::after { opacity: 1; transform: scaleX(1); }

    article {
      max-width: 720px;
      margin: 100px auto 0;
      padding: 0 1.5rem 3rem;
    }

    article h1 {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 0.6rem;
      color: #fff;
    }

    .post-meta {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    article h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin: 2rem 0 0.75rem;
      letter-spacing: -0.02em;
    }

    article h3 {
      font-size: 1.15rem;
      font-weight: 600;
      color: #e0e0e0;
      margin: 1.5rem 0 0.5rem;
    }

    article p {
      margin-bottom: 1.25rem;
      color: #d0d2d6;
    }

    article a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.2s;
    }
    article a:hover { color: #b8aeff; }

    article ul, article ol {
      margin: 0 0 1.25rem 1.5rem;
      color: #d0d2d6;
    }
    article li { margin-bottom: 0.4rem; }

    article blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1.25rem;
      margin: 1.5rem 0;
      background: rgba(124, 111, 240, 0.04);
      border-radius: 0 8px 8px 0;
      color: var(--text-secondary);
    }

    article code {
      font-family: "JetBrains Mono", monospace;
      background: rgba(255,255,255,0.04);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.85em;
      color: #c8c0f0;
    }

    article pre {
      background: #0d0f1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    article pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
      color: #c8c0f0;
    }

    article img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin: 1.5rem 0;
      border: 1px solid var(--border);
    }

    article hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    .post-nav {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .post-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .post-nav a:hover { color: var(--accent); }

    footer {
      text-align: center;
      padding: 2rem;
      color: rgba(255,255,255,0.2);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { color: #b8aeff; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 768px) {
      article { margin-top: 80px; }
      article h1 { font-size: 1.6rem; }
      article h2 { font-size: 1.2rem; }
      nav { gap: 1.5rem; padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/resources.html' | relative_url }}">Resources</a>
  </nav>

  <article>
    <a class="back-link" href="{{ '/' | relative_url }}">&larr; Back to Home</a>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      {% if page.date %}{{ page.date | date: "%B %d, %Y" }}{% endif %}
      {% if page.author %} &middot; {{ page.author }}{% endif %}
    </div>
    <div class="post-content">
      {{ content }}
    </div>
  </article>

  <footer>
    <p>{{ site.title }} &mdash; <a href="{{ '/' | relative_url }}">Home</a> &middot; <a href="{{ '/resources.html' | relative_url }}">Resources</a></p>
  </footer>
</body>
</html>
